AWSTemplateFormatVersion: "2010-09-09"
Description: OpenAI agentic hospital real-time inference Lambda endpoint.

Parameters:
  ProjectName:
    Type: String
    Default: agentic-open-ai
  ArtifactBucketName:
    Type: String
    Description: S3 bucket containing the packaged Lambda artifact.
  LambdaS3Key:
    Type: String
    Description: S3 key for the packaged Lambda zip.
  OpenAIApiKeySecretArn:
    Type: String
    Description: Secrets Manager ARN containing the OpenAI API key.
  OpenAIModel:
    Type: String
    Default: gpt-5.2

Resources:
  AgenticFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-agentic-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-agentic-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OpenAIApiKeySecretArn

  AgenticFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-agentic-endpoint
      Role: !GetAtt AgenticFunctionRole.Arn
      Runtime: python3.12
      Handler: app.lambda_handler
      Timeout: 90
      MemorySize: 512
      Code:
        S3Bucket: !Ref ArtifactBucketName
        S3Key: !Ref LambdaS3Key
      Environment:
        Variables:
          OPENAI_API_KEY_SECRET_ARN: !Ref OpenAIApiKeySecretArn
          OPENAI_MODEL: !Ref OpenAIModel
          MAX_OUTPUT_TOKENS: "1400"
          RAG_KNOWLEDGE_PATH: hospital_agentic_rag_knowledge.txt
          RAG_TOP_K: "4"

  AgenticFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref AgenticFunction
      AuthType: AWS_IAM
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
        AllowHeaders:
          - content-type
          - authorization
          - x-amz-date
          - x-amz-security-token

  AgenticFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgenticFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: AWS_IAM

Outputs:
  AgenticFunctionName:
    Value: !Ref AgenticFunction
  AgenticFunctionUrl:
    Value: !GetAtt AgenticFunctionUrl.FunctionUrl
