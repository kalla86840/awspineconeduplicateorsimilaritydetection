version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    ARTIFACT_BUCKET: mlopswithsagemaker111
    STACK_NAME: open-ai-pinecone-duplicate-detection-endpoint
    PROJECT_NAME: open-ai-pinecone-duplicate-detection
    OPENAI_MODEL: gpt-5.2
    OPENAI_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
    PINECONE_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:awspineconeapikey1-kiudra
    PINECONE_INDEX_NAME: open-ai-pinecone-duplicate-detection-1024
    PINECONE_INDEX_HOST: ""
    PINECONE_NAMESPACE: news
    PINECONE_MEMORY_NAMESPACE: agent-memory
    PINECONE_DUPLICATE_NAMESPACE: news
    PINECONE_CLASSIFICATION_NAMESPACE: news
    PINECONE_CLUSTERING_NAMESPACE: news
    PINECONE_MULTIMODAL_NAMESPACE: news
    PINECONE_DIMENSION: "1024"
    PINECONE_UPSERT_ON_QUERY: "true"
    DUPLICATE_SCORE_THRESHOLD: "0.98"
    SIMILARITY_SCORE_THRESHOLD: "0.85"

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install --upgrade pip
      - mkdir -p package
      - pip install -r rag_endpoint/requirements.txt -t package
  build:
    commands:
      - export PINECONE_INDEX_NAME="open-ai-pinecone-duplicate-detection-1024"
      - export PINECONE_INDEX_HOST=""
      - export PINECONE_DIMENSION="1024"
      - export PINECONE_UPSERT_ON_QUERY="true"
      - cp rag_endpoint/app.py package/app.py
      - mkdir -p package/knowledge
      - cp rag_endpoint/knowledge/open_ai_rag_knowledge.txt package/knowledge/open_ai_rag_knowledge.txt
      - cd package
      - zip -r ../open-ai-pinecone-duplicate-detection-endpoint.zip .
      - cd ..
      - aws s3 cp open-ai-pinecone-duplicate-detection-endpoint.zip "s3://${ARTIFACT_BUCKET}/open-ai-pinecone-duplicate-detection/open-ai-pinecone-duplicate-detection-endpoint.zip"
      - |
        aws cloudformation deploy \
          --region "$AWS_REGION" \
          --template-file infrastructure/open-ai-rag-endpoint.yaml \
          --stack-name "$STACK_NAME" \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides \
            ProjectName="$PROJECT_NAME" \
            ArtifactBucketName="$ARTIFACT_BUCKET" \
            LambdaZipKey=open-ai-pinecone-duplicate-detection/open-ai-pinecone-duplicate-detection-endpoint.zip \
            OpenAIApiKeySecretArn="$OPENAI_API_KEY_SECRET_ARN" \
            PineconeApiKeySecretArn="$PINECONE_API_KEY_SECRET_ARN" \
            PineconeIndexName="$PINECONE_INDEX_NAME" \
            PineconeIndexHost="$PINECONE_INDEX_HOST" \
            PineconeNamespace="$PINECONE_NAMESPACE" \
            PineconeMemoryNamespace="$PINECONE_MEMORY_NAMESPACE" \
            PineconeDuplicateNamespace="$PINECONE_DUPLICATE_NAMESPACE" \
            PineconeClassificationNamespace="$PINECONE_CLASSIFICATION_NAMESPACE" \
            PineconeClusteringNamespace="$PINECONE_CLUSTERING_NAMESPACE" \
            PineconeMultimodalNamespace="$PINECONE_MULTIMODAL_NAMESPACE" \
            PineconeDimension="$PINECONE_DIMENSION" \
            PineconeUpsertOnQuery="$PINECONE_UPSERT_ON_QUERY" \
            DuplicateScoreThreshold="$DUPLICATE_SCORE_THRESHOLD" \
            SimilarityScoreThreshold="$SIMILARITY_SCORE_THRESHOLD" \
            OpenAIModel="$OPENAI_MODEL"
      - aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs" --output table
      - ENDPOINT_URL=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='EndpointUrl'].OutputValue | [0]" --output text)
      - 'curl -sS -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_duplicate_similarity_request.json -o pinecone-duplicate-similarity-response.json'
      - cat pinecone-duplicate-similarity-response.json
      - python -c "import json, sys; body=json.load(open('pinecone-duplicate-similarity-response.json')); ok='error' not in body and body.get('retrieval_source') == 'pinecone' and body.get('matches') is not None; print(json.dumps(body, indent=2)); print('Pinecone duplicate/similarity detection task passed with 1024-dimensional embeddings') if ok else None; sys.exit(0 if ok else 1)"
      - 'curl -sS -X POST "$ENDPOINT_URL" -H "content-type: application/json" -d @samples/pinecone_semantic_search_request.json -o pinecone-semantic-search-response.json'
      - cat pinecone-semantic-search-response.json
      - python -c "import json; body=json.load(open('pinecone-semantic-search-response.json')); assert body.get('retrieval_source') == 'pinecone' and body.get('retrieved_context'), body; print('Pinecone semantic search compatibility task passed')"

artifacts:
  files:
    - open-ai-pinecone-duplicate-detection-endpoint.zip
    - pinecone-duplicate-similarity-response.json
    - pinecone-semantic-search-response.json

