version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    PROJECT_NAME: openai-prompt-ops
    ARTIFACT_BUCKET: mlopswithsagemaker111
    OPENAI_MODEL: gpt-5.2
    OPENAI_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip
  build:
    commands:
      - rm -rf build dist
      - mkdir -p build dist
      - python -m pip install -r aiops_endpoint/requirements.txt -t build
      - cp aiops_endpoint/app.py aiops_endpoint/prompt_profiles.yaml build/
      - cd build && zip -r ../dist/aiops-endpoint.zip . && cd ..
      - aws s3 cp dist/aiops-endpoint.zip "s3://${ARTIFACT_BUCKET}/${PROJECT_NAME}/lambda/aiops-endpoint.zip"
      - aws cloudformation deploy --template-file infrastructure/aiops-endpoint.yaml --stack-name "${PROJECT_NAME}-aiops-endpoint" --capabilities CAPABILITY_NAMED_IAM --parameter-overrides ProjectName="${PROJECT_NAME}" ArtifactBucketName="${ARTIFACT_BUCKET}" LambdaS3Key="${PROJECT_NAME}/lambda/aiops-endpoint.zip" OpenAIApiKeySecretArn="${OPENAI_API_KEY_SECRET_ARN}" OpenAIModel="${OPENAI_MODEL}"

artifacts:
  files:
    - dist/aiops-endpoint.zip
